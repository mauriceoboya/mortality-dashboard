name: Mortality Dashboard CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # 3. Setup system dependencies (critical fix for fs, sass, bslib)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff5-dev \
            pkg-config \
            libv8-dev

      # 4. Install R dependencies (recommended modern approach)
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            shiny

      # 5. Syntax check (fail fast if app has errors)
      - name: Syntax check
        run: |
          Rscript -e 'source("app.R", local = new.env())'

      # 6. Validate Shiny app starts (non-blocking smoke test)
      - name: Smoke test Shiny app
        run: |
          Rscript -e "
            library(shiny)

            # Try to load app without blocking CI
            app <- shiny::shinyAppDir('.')

            # If we reach here, app structure is valid
            cat('Shiny app loaded successfully\n')
          "
