name: Mortality Dashboard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("shiny"), repos="https://cloud.r-project.org")'

      - name: Syntax check
        run: |
          Rscript -e 'source("app.R", local = new.env())'

      - name: Start app and verify
        run: |
          timeout 30s Rscript -e "
          options(shiny.port=3838, shiny.host='0.0.0.0');
          shiny::runApp('app.R')
          " || EXIT_CODE=$?

          if [ "$EXIT_CODE" -ne 124 ] && [ -n "$EXIT_CODE" ]; then
            exit $EXIT_CODE
          fi
